---
image: git.opentalk.dev:5050/opentalk/backend/containers/rust:1.93.0-trixie

.default_job_condition: &default_job_condition
  needs: []
  rules:
    # Run in merge requests (if there is one job with this instruction, all jobs without
    # it are ignored for the MR pipeline)
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    # Run on scheduled pipeline runs
    - if: $CI_PIPELINE_SOURCE == 'schedule'

stages:
  - lint
  - build
  - pipeline

lint:fmt:
  stage: lint
  <<: *default_job_condition
  script:
    - cargo +nightly fmt -- --check

lint:clippy:
  stage: lint
  <<: *default_job_condition
  script:
    - cargo clippy --workspace --all-features --tests -- --deny warnings

lint:doc:
  stage: lint
  <<: *default_job_condition
  variables:
    RUSTDOCFLAGS: -Dwarnings
  script:
    - cargo doc --workspace --no-deps

lint:dependency_check:
  stage: lint
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - Cargo.lock
        - deny.toml
    - if: $CI_PIPELINE_SOURCE == 'schedule'
  script:
    - cargo-deny --workspace check --deny unmatched-skip --deny license-not-encountered

lint:unnecessary_dependencies:
  stage: lint
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  before_script: if ! cargo machete --version; then cargo install cargo-machete; fi
  script:
    - cargo machete --with-metadata

lint:commit:
  image: node:lts-alpine
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  before_script:
    - apk add --no-cache git
    - npm install -g @commitlint/cli @commitlint/config-conventional
  script:
    - npx commitlint --from $CI_MERGE_REQUEST_DIFF_BASE_SHA --to HEAD --verbose

lint:yaml:
  stage: lint
  <<: *default_job_condition
  image: alpine:3.23
  before_script:
    - apk add yamllint
  script: yamllint .

lint:toml:
  stage: lint
  <<: *default_job_condition
  script: taplo fmt --check

lint:markdown:
  stage: lint
  <<: *default_job_condition
  image: registry.gitlab.com/pipeline-components/markdownlint:latest
  script:
    - mdl --style .markdown_style.rb --warnings .

lint:shellcheck:
  stage: lint
  <<: *default_job_condition
  before_script:
    - apt-get update && apt-get install -y shellcheck
  script:
    - git ls-files --exclude='*.sh' --ignored -c -z | xargs -0r shellcheck

# Also run the changelog bot for it's own repository
lint:changelog:
  stage: lint
  <<: *default_job_condition
  image:
    name: git.opentalk.dev:5050/opentalk/backend/containers/rust:1.93.0-trixie
    entrypoint: ['']
  variables:
    GITLAB_TOKEN: $CHANGELOG_BOT_TOKEN
    TARGET_REPO: $CI_PROJECT_PATH
    SOURCE_REPO: $CI_MERGE_REQUEST_SOURCE_PROJECT_PATH
    TARGET_BRANCH: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    SOURCE_BRANCH: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    GITLAB_MR: $CI_MERGE_REQUEST_IID
  before_script:
    - apt-get update && apt-get install -y jq
  script:
    - cargo install --path ot-gitlab-cli
    - cargo install --path opentalk-git-cliff
    - ./comment-changelog-additions.sh

pipeline:changelog:
  stage: pipeline
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  image:
    name: git.opentalk.dev:5050/opentalk/tools/check-changelog:dev
    entrypoint: ['']
  variables:
    GITLAB_TOKEN: $CHANGELOG_BOT_TOKEN
    TARGET_REPO: $PIPELINE_PROJECT_PATH
    SOURCE_REPO: $PIPELINE_MERGE_REQUEST_PROJECT_PATH
    TARGET_BRANCH: $PIPELINE_MERGE_REQUEST_TARGET_BRANCH_NAME
    SOURCE_BRANCH: $PIPELINE_MERGE_REQUEST_SOURCE_BRANCH_NAME
    GITLAB_MR: $PIPELINE_MERGE_REQUEST_IID
  script:
    - ./comment-changelog-additions.sh

build:container:
  stage: build
  variables:
    IMAGE_DESTINATION_ARGS: --no-push
  rules:
    # Don't run on feature branches if there is a MR
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Don't run on triggered/child pipelines
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        IMAGE_DESTINATION_ARGS: --destination $CI_REGISTRY_IMAGE:dev
    - if: $CI_COMMIT_TAG != null
      variables:
        IMAGE_DESTINATION_ARGS: >
          --destination $CI_REGISTRY_IMAGE:latest
          --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - if: >
        $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH &&
        $CI_COMMIT_BRANCH != null
      variables:
        IMAGE_DESTINATION_ARGS: --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  # IMAGE_DESTINATION_ARGS will be set inside the script
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: ['']
  script:
    # According to https://docs.docker.com/engine/reference/commandline/tag/
    # the tag may contain lowercase and uppercase letters, digits, underscores,
    # periods, and hyphens, so we replace everything else by '_'. It cannot start
    # with a period or hyphen, so we replace those if we find them at the start of a line.
    # It must be no longer than 128 characters, so we truncate it in addition.
    #
    # tr -c means the same as --complement, but busybox tr doesn't have that
    - >
      if [ $CI_PIPELINE_SOURCE == 'merge_request_event' ]; then
        IMAGE_TAG=$(
          echo -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" |
          tr -c '[:alnum:]_.-' '_' |
          sed 's/^[.-]/_/' |
          cut -c -128
        );
        IMAGE_DESTINATION_ARGS="--destination $CI_REGISTRY_IMAGE:$IMAGE_TAG";
      fi
    - mkdir -p /kaniko/.docker
    - >
      echo
      "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" >
      /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --registry-mirror=mirror.gcr.io
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      $IMAGE_DESTINATION_ARGS
      --force
