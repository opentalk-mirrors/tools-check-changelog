# Custom git-cliff config for OpenTalk projects.

[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version == "hidden" -%}
{% elif version -%}
    {% set section_name = version | trim_start_matches(pat="v") -%}
    ## [{{ section_name }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    {% set section_name = "Unreleased" -%}
    ## [{{ section_name }}]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - \
        {% if commit.scope %}({{commit.scope}}) {% endif %}\
        {{ commit.message | upper_first }} (\
            {% if commit.remote.pr_number %}[!{{ commit.remote.pr_number }}](https://git.opentalk.dev/{{ remote.gitlab.owner }}/{{ remote.gitlab.repo }}/-/merge_requests/{{ commit.remote.pr_number }}){% endif -%}\
            {% if commit.footers %}{% for footer in commit.footers %}\
                {% if footer.token is matching("[Cc]lose[sd]|[Ff]ixe[sd]|[Rr]elate[sd]") %}, [#{{footer.value}}](https://git.opentalk.dev/{{ remote.gitlab.owner }}/{{ remote.gitlab.repo }}/-/issues/{{footer.value}}){% endif %}\
            {%- endfor %}{% endif -%}\
        )
    {%- endfor %}
{% endfor %}

"""

# remove the leading and trailing whitespace from the templates
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true

# parsers that match first are prioritized
commit_parsers = [
  # Skip processing the commit if the commit footer contains "changelog: ignore".
  { footer = "^changelog: ?ignore", skip = true },

  # Rules are prioritized, keep this first so that it is matched before the other chore and fix rules
  { group = "<!-- 7 --> 📦 Dependencies", message = "^(chore|fix)\\(deps\\)*" },
  # Skip release related commits (sync changelog, bump version numbers)
  { message = "^(chore)\\(release\\)*", skip = true },

  { group = "<!-- 1 -->🥰 User experience", message = "^(chore|fix|feat)\\(ux\\)*" },
  { group = "<!-- 0 -->🚀 New features", message = "^feat*" },
  { group = "<!-- 2 -->🛡️ Security", body = ".*security" },
  { group = "<!-- 3 -->🐛 Bug fixes", message = "^fix*" },
  { group = "<!-- 4 -->⚡ Performance", message = "^perf*" },
  { group = "<!-- 5 -->📚 Documentation", message = "^docs*" },
  { group = "<!-- 6 -->🔨 Refactor", message = "^refactor*" },
  # Dependencies 7, see further above
  { group = "<!-- 8 --> ✨ Style", message = "^style*" },
  { group = "<!-- 9 -->⚙ Miscellaneous", message = "^chore*" },
]

# regex for matching git tags
tag_pattern = "v.*"

# regex for skipping tags
ignore_tags = "v.*-(?:rc|alpha|beta).*"
