include = ["**/*.toml"]

[formatting]
reorder_arrays = true
reorder_keys = true

# The git-cliff config contains arrays which depend on their order.
[[rule]]
include = ["git-cliff-config/*.toml"]

[rule.formatting]
reorder_arrays = false
